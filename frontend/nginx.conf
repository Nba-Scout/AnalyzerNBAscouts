# nginx — serve a SPA Vite e faz proxy de /api para o backend FastAPI.
# Usado pelo estágio final do Dockerfile (docker/compose.yml: serviço `frontend`).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão dos assets de texto
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Assets versionados (hash no nome) → cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy da API → backend (serviço `api` na rede do compose).
    # O backend já serve sob /api (routers com prefix="/api"), então NÃO há barra
    # final no proxy_pass: /api/props → http://api:8000/api/props.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # index.html nunca em cache (sempre busca o bundle mais novo)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — qualquer rota desconhecida cai no index (HashRouter resolve)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
