# nginx — serve a SPA Vite e faz proxy de /api para o backend FastAPI.
# Usado pelo estágio final do Dockerfile (docker/compose.yml: serviço `frontend`).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão dos assets de texto
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    # NOTA nginx: um `location` com `add_header` próprio NÃO herda os add_header do
    # server. Por isso os headers são repetidos nos blocos /assets/ e = /index.html
    # (que têm Cache-Control próprio). CSP "básica": bloqueia script/objeto externos
    # e clickjacking; libera img/font passivos e estilos inline (UI libs). Se o
    # frontend passar a usar origem externa (fontes/CDN/analytics), estenda a CSP.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Assets versionados (hash no nome) → cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Proxy da API → backend (serviço `api` na rede do compose).
    # Sem barra final no proxy_pass: /api/props → http://api:8000/api/props.
    # (herda os security headers do server — não tem add_header próprio)
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # index.html nunca em cache (sempre busca o bundle mais novo).
    # Repete os security headers porque tem add_header próprio (Cache-Control).
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # SPA fallback — qualquer rota desconhecida cai no index (HashRouter resolve).
    # Sem add_header próprio → herda os security headers do server.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
