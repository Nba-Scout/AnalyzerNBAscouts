# Provider de dashboards — carrega os JSONs de /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: nba-scout
    orgId: 1
    folder: NBA Scout
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
