version: 2
# Todos os updates apontam para `develop` (não `main`): os bumps entram pelo
# mesmo fluxo do resto (develop → release → main), sem fazer o main divergir.
updates:
  - package-ecosystem: pip
    directory: /backend
    target-branch: develop
    schedule:
      interval: weekly
    labels: [dependencies, python]
    groups:
      # Agrupa minor/patch num único PR; majors continuam isolados p/ review.
      python-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    target-branch: develop
    schedule:
      interval: weekly
    labels: [dependencies, javascript]
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /backend
    target-branch: develop
    schedule:
      interval: weekly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /frontend
    target-branch: develop
    schedule:
      interval: weekly
    labels: [dependencies, docker]

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    labels: [dependencies, github-actions]
    groups:
      actions-minor-patch:
        update-types: [minor, patch]
