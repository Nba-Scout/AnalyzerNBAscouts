version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, python]
    groups:
      # Agrupa minor/patch num único PR; majors continuam isolados p/ review.
      python-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies, javascript]
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies, docker]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, github-actions]
    groups:
      actions-minor-patch:
        update-types: [minor, patch]
