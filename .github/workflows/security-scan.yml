name: Security Scan

# Varredura de segredos (gitleaks) + vulnerabilidades/misconfig (trivy).
# Falha em segredos vazados ou vulnerabilidades HIGH/CRITICAL com fix disponível.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Segunda-feira 06:30 UTC
    - cron: "30 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Segredos no histórico (gitleaks) ───────────────────────────────────────
  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo: gitleaks varre todos os commits

      - name: Run gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 detect \
            --source=/repo --redact --verbose --exit-code=1

  # ── Vulnerabilidades + misconfig no filesystem (trivy) ─────────────────────
  trivy-fs:
    name: Trivy (fs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (SARIF para o Security tab)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Trivy filesystem scan (gate — falha em HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
