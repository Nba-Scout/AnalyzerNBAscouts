# Override para desenvolvimento local — auto-merge com compose.yml
# `docker compose -f docker/compose.yml -f docker/compose.override.yml up`

name: nba-scout

services:
  # Em dev: uvicorn com --reload + bind mount (hot-reload no save)
  api:
    command:
      - uvicorn
      - app.main:app
      - --reload
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"

  worker:
    volumes:
      - ../backend:/app

  # Frontend em dev roda FORA do compose via `npm run dev` (Vite HMR + proxy → :8000)
  # Remova o serviço frontend do compose.yml ao desenvolver o front localmente
  frontend:
    profiles:
      - prod-only  # não sobe no `compose up` padrão de dev

  postgres:
    ports:
      - "5432:5432"  # expõe para ferramentas locais (DBeaver, psql)

  redis:
    ports:
      - "6379:6379"  # expõe para redis-cli local
